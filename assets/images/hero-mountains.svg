<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151515"/>
      <stop offset="0.42" stop-color="#211d1a"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="52%" cy="20%" r="55%">
      <stop offset="0" stop-color="#b77b4f" stop-opacity=".18"/>
      <stop offset=".45" stop-color="#e9e1d6" stop-opacity=".08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#50483e"/>
      <stop offset=".45" stop-color="#24221f"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#797167"/>
      <stop offset=".35" stop-color="#2e2b27"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="url(#sky)"/>
  <rect width="1800" height="1200" fill="url(#glow)"/>

  <g opacity=".35" filter="url(#soft)">
    <ellipse cx="900" cy="520" rx="760" ry="120" fill="#e9e1d6"/>
    <ellipse cx="620" cy="570" rx="480" ry="90" fill="#b77b4f"/>
  </g>

  <g opacity=".9">
    <path d="M-60 690 L250 350 L370 500 L515 260 L710 610 L850 270 L1040 630 L1175 395 L1345 650 L1495 370 L1880 720 L1880 1200 L-60 1200Z" fill="url(#mountain)"/>
    <path d="M190 660 L515 260 L462 510 L535 468 L710 610 L570 608 Z" fill="#a79d91" opacity=".20"/>
    <path d="M740 645 L850 270 L914 510 L1040 630 L915 615 Z" fill="#f2eee8" opacity=".18"/>
    <path d="M1380 665 L1495 370 L1540 548 L1660 650 L1535 620 Z" fill="#e9e1d6" opacity=".13"/>
  </g>

  <g opacity=".78">
    <path d="M-80 780 L180 545 L305 720 L420 520 L600 760 L735 575 L880 755 L1000 545 L1180 760 L1360 545 L1880 790 L1880 1200 L-80 1200Z" fill="#111"/>
  </g>

  <g opacity=".62" filter="url(#soft)">
    <path d="M0 720 C260 645 410 690 610 640 C835 585 1060 650 1260 600 C1460 552 1600 600 1800 560 L1800 760 C1460 710 1310 762 1095 735 C785 695 620 790 370 745 C200 715 120 745 0 765Z" fill="#d8d0c6"/>
  </g>

  <g fill="#050606">
    <path d="M0 850 C260 765 515 780 710 820 C1000 880 1280 765 1800 825 L1800 1200 L0 1200Z"/>
  </g>

  <g fill="#020303" opacity=".98">
    <g transform="translate(0 620)">
      <use href="#tree" x="30" y="70" width="120" height="260"/>
    </g>
  </g>

  <symbol id="pine" viewBox="0 0 120 280">
    <path d="M60 0 L95 78 L75 72 L110 150 L88 142 L120 235 L69 210 L69 280 L51 280 L51 210 L0 235 L32 142 L10 150 L45 72 L25 78Z"/>
  </symbol>

  <g fill="#030404">
    <use href="#pine" x="25" y="735" width="105" height="250"/>
    <use href="#pine" x="105" y="710" width="130" height="320"/>
    <use href="#pine" x="210" y="760" width="95" height="240"/>
    <use href="#pine" x="310" y="720" width="135" height="350"/>
    <use href="#pine" x="460" y="755" width="100" height="270"/>
    <use href="#pine" x="580" y="695" width="150" height="390"/>
    <use href="#pine" x="720" y="740" width="115" height="310"/>
    <use href="#pine" x="870" y="690" width="165" height="430"/>
    <use href="#pine" x="1010" y="760" width="110" height="285"/>
    <use href="#pine" x="1130" y="715" width="148" height="385"/>
    <use href="#pine" x="1290" y="748" width="118" height="315"/>
    <use href="#pine" x="1430" y="690" width="175" height="455"/>
    <use href="#pine" x="1580" y="735" width="125" height="335"/>
    <use href="#pine" x="1710" y="710" width="150" height="410"/>
  </g>

  <rect width="1800" height="1200" fill="#000" opacity=".38"/>
  <rect width="1800" height="1200" filter="url(#grain)" opacity=".5"/>
</svg>